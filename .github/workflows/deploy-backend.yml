name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'backend.Tests/**'
      - '.github/workflows/deploy-backend.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'backend.Tests/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  build-test-format:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Solution Dependencies
        run: dotnet restore 10xCookBook.sln

      - name: Verify Code Formatting
        run: dotnet format 10xCookBook.sln --verify-no-changes --no-restore

      - name: Build Solution (Release Configuration)
        run: dotnet build 10xCookBook.sln --configuration Release --no-restore

      - name: Run Backend Tests
        run: dotnet test 10xCookBook.sln --configuration Release --no-build

      - name: Publish Backend
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish -c Release -o ./myapp
        working-directory: backend

      - name: Deploy to Azure Web App
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cookbook-api-unique'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: backend/myapp
