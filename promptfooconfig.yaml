# promptfooconfig.yaml
prompts:
  - "review the diff"

providers:
  - id: file://scripts/promptfoo-provider.ts
    config:
      model: gemini-3.1-flash-lite
  - id: file://scripts/promptfoo-provider.ts
    config:
      model: gemini-1.5-pro
  - id: file://scripts/promptfoo-provider.ts
    config:
      model: gemini-1.5-flash

tests:
  - vars:
      diff: file://scripts/tests/fixtures/react-migration.diff
    assert:
      - type: javascript
        value: |
          try {
            const data = JSON.parse(output);
            const required = [
              "implementationCorrectness",
              "readabilityAndCleanCode",
              "complexity",
              "performanceAndResourceEfficiency",
              "securitySafety",
              "idiomaticity",
              "verdict",
              "summary"
            ];
            for (const k of required) {
              if (data[k] === undefined) return false;
            }
            return data.verdict === 'fail';
          } catch(e) {
            return false;
          }
      - type: llm-rubric
        value: "The output summary correctly identifies that: 1) componentWillMount is a deprecated lifecycle method, 2) document.getElementById is direct DOM manipulation, and 3) the fetch API call is inside the render method."
        provider: google:gemini-3.1-flash-lite
