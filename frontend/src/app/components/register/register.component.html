<div class="auth-container">
  <div class="premium-card">
    <div class="brand-header">
      <div class="brand-logo">10xCookBook</div>
      <div class="brand-subtitle">Zarejestruj nowe konto deweloperskie</div>
    </div>

    <div *ngIf="errorMessage" class="alert-card">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input 
          type="email" 
          id="email" 
          formControlName="email" 
          class="form-input" 
          placeholder="twoj@email.com"
          autocomplete="email"
        />
        <span *ngIf="isFieldInvalid('email')" class="validation-error">
          Wprowadź poprawny adres e-mail
        </span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Hasło</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-input" 
          placeholder="Min. 6 znaków"
          autocomplete="new-password"
        />
        <span *ngIf="isFieldInvalid('password')" class="validation-error">
          Hasło musi mieć co najmniej 6 znaków
        </span>
      </div>

      <button type="submit" [disabled]="registerForm.invalid || isLoading" class="premium-btn">
        {{ isLoading ? 'Tworzenie konta...' : 'Zarejestruj się' }}
      </button>
    </form>

    <div class="auth-switch">
      Masz już konto? 
      <a class="auth-link" routerLink="/login">Zaloguj się</a>
    </div>
  </div>
</div>
